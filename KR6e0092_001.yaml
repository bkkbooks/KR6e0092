body:
  text: 晉水沙門淨源述夫宗經為觀傳諸後嗣以教類之略有三焉昔帝心尊者集法界觀門則宗乎化教矣澄照律師述淨心戒觀則宗乎制教矣若乃化制並宗性相互陳唯賢首國師妄盡還源兼而有之故其圓頓之機權小之流悉皆普被耳源景祐中稟茲觀門於崑山慧聚法師之門名諱清本並疏兩軸科文一冊皆法燈大師之所撰也然其間所釋序文及諸觀義雖盡乎善而未盡乎美於是舉要治繁選言發行探清涼之疏旨索演義之鈔辭補其偏善之功成其具美之績故命題曰疏鈔補解焉古人有言不截盤根無以驗其利器不剖文奧無以辨其通才後之孫謀通吾祖觀心昭昭然若杲日之麗天且不為昏情所翳者其在茲乎時元豐二年歲次己未夏安居後三日於雲間善住寶閣序題中修之一字總貫名題謂本文別舉六門通為一觀以前之三門一體二用三遍通揀情顯解謂一塵含容空有遍中以真空幻色雙揀斷空實色第四門修四種行德為熏習止觀方便其第五門入五止第六門起六觀方為造詣正修由是隨入一門即全收法界矣上釋修字下之九字別申綱要華嚴奧旨即所依經也華喻萬行之因嚴飾十身之果奧謂竪深與衆典為洪源也旨乃橫廣攝群經為眷屬也妄盡還源即能依觀也妄法無體義說為盡會歸一心喻派還源故正彪之水賦云萬派雖別同出於源衆流雖殊同歸于海若合心源如清涼謂隨客塵則去而莫歸見本性則還源反本觀者妄盡智泯本覺真性與萬法融通之稱也然真本不可以功成要亡功而本就深源不可以智得必智盡而源成故曰觀者妄盡智泯也下文亦云識盡見除清涼謂情盡理現諸見自亡文雖廣略有異義乃頓證全同若準終南觀題為例應云略有異義乃頓證六重今此不標者以下文統收中謂此上所述六重觀門舉一為主餘五為伴具在末章耳並序者並兼也序敘也敘述法義之要旨及集觀之利物也或曰大方廣所證法也佛華嚴能證人也今題中何以但標能證二字答夫觀者開發後學之慧門冥通諸佛之果海慧門既開自見依正重重無盡此其大用也若乃明其一經三大皆大方廣五周因果並佛華嚴人法雙標法喻齊舉有體有用兼因兼果理盡義圓備如疏文解釋經題七字今此立名尚簡唯取華嚴二字為所依經也若然則法界觀題何以具盡六字耶夫廣略分途述作異轍體勢萬端不可一準若責賢首立題闕大方廣佛四字不責帝心題下闕並序二字耶前修謂直默異難微貶穿鑿斯亦吾志京即長安張晏注漢書云地絶高曰京左氏傳曰莫之與京京大也唐虞已前帝王之居多云都某處世紀云伏羲神農都陳是也大薦福者唐之精舍頗衆亦有小薦福故以大字揀之薦追也言為考妣追福也此寺即唐中宗皇帝所造按大宋高僧傳曰中宗有懷罔極追福因心先於長安造薦福寺事不時就作者煩勞乃勑工部尚書張錫與律師釋道岸同典其任廣開方便博施慈悲人或子來役無留務費約功陪帝甚嘉之寺者梵言毗訶羅此云游止即出家者游履之處也廣雅云寺治也釋名曰治事者嗣續於其內也沙門此云息惡無惡不息即釋子之通稱也次二字名諱也按祕書少監㶄朝隱述銘云國師姓康氏諱法藏纍代相承為康居國相祖自康居來朝父諡皇朝贈左侍中國師年甫十六鍊一指於阿育王舍利以申供養此後便游大白雅挹重玄聞雲華寺儼法師講華嚴經投為上足以為水置瓶之受納以芥投針之因緣名播招提譽流宸極屬榮國夫人奄捐館舍未易齊縗上資音下催音則天聖后廣樹佛乘大開法寶國師䇿名宮禁落髮道場住太原寺證聖年中奉勑與于闐三藏實叉難陀譯華嚴經至神龍中又同譯大寶積經唯聖之所歸依唯皇之所回向爰降綸旨為菩薩戒師太上皇脫履萬機褰衣四海亦受戒法講華嚴經三十餘遍梵網楞伽密嚴起信皆有義疏傳于四方先天元年壬子十一月十四日終身西京大薦福寺春秋七十其年十一月二十四日葬於神禾原華嚴寺南帝念若驚聖情如失誥曰國師德業天資虗明契理辨才韜識了覺融心廣開喻筏之門備闡傳燈之教隨緣示應埀化斯盡比真師寂雖證無生之空朝序飾終宜有褒賢之命可贈鴻臚卿贈絹一千二百匹葬事准僧例餘皆官供若夫集觀判教獨得其奧制疏通經名耀古今具如聖宋僧傳並七祖傳文述者明也樂記云作者曰聖述者曰明然帝心名諱之下稱集今言述者何耶謂序文之未具彰創集無疑先規有據故此不云集耳滿教即華嚴也文出北本涅槃經彼經明半字即小乘滿字即大乘故清凉云半滿是喻大小是法而言難思者此教非法相所宗故不可以心思也窺者左傳曰舉足而視也一塵頓現如行願品云於一塵中塵教佛各處菩薩衆會中此文亦遍大部下文國師引剎現佛身經云花藏世界所有塵一一塵中佛皆入普為衆生起神變毗盧遮那法如是圓宗者起信疏明大小乘宗途有五一隨相法執宗二真空無相宗三唯識法相宗四如來藏緣起宗五圓融具德宗故賢首云圓宗主伴具足重重無盡即大經也而言叵測者此宗非名句所及故不可以言測也觀者看也纖毫齊彰謂纖小一毛也現相品云如來於一毛孔中一切剎塵諸佛坐下文引身現剎土經云一毛孔內無量剎各有四洲四大海須彌鐵圍亦復然悉現其中無迫溢上句示一塵約外依報也下句顯纖毫約內正報也齊彰即頓現文體小變耳故義海云一多全攝窺一塵所以頓彰彼此相收瞻纖毫以之齊現或問滿教與圓宗其旨何異答大疏曰夫立教必須斷證階位等殊立宗但明所宗差別故有不同耳然者不定之辭用就體分即止之觀也非無差別之勢謂觀照性相也故義海云標體開用助道之品蓋多就性明緣差別之勢不一事依理顯即觀之止也自有一際之形謂止息萬緣也義海又謂法無分齊現必同時理不礙差隱顯一際或謂用就體分即下文一體二用者既序體用何不述三遍四德耶此誠曲配故不取之其猶下文有六句初二句法喻雙標次二句釋喻後二句釋法初病起藥興妄生智立者謂病發者必用藥以治之妄生者必立智以祛之按無相集云病有二種一緣慮二無記緣慮者善惡二念也雖復差殊俱非解脫是故總束名為緣慮無記者雖不緣善惡等事然非真心俱是昏住他宗執無記為真心何異認瓦礫為真金乎藥亦有二種一寂寂二惺惺寂寂謂不念外境善惡等事惺惺謂不生昏住無記等相是故以寂寂治緣慮以惺惺治昏住亦止觀二行治之即前妄生智立也然妄生則煩惱所知二障智立則如理如量二智如理智破煩惱即無緣慮也如量智破所知即無昏住也所以引無相二病二藥消文者蓋與諸家二智二障義同耳病忘藥忘下二句釋喻也謂昏散兩病既忘則止觀二藥亦忘故以空拳喻藥忘也止啼喻病忘也潛夫曰譬若握空拳以誑誘於孺子也厥或呱呱之泣既止則開拳舒手豈有物耶孺謂孩孺呱音孤泣聲也心通法通下二句釋法也謂心通則二智俱泯法通則二障雙亡智障寂然物我冥一故引虗空以喻性遍也大經云譬如虗空普遍一切又曰法性遍在一切處既覺既悟下既已也謂昏散之妄已覺頓除則現量之智亦悟齊泯故云何滯何通也百非者肇法師謂但有一法則名為非法不止一故云百非攀緣者以妄相微動攀緣諸法也筆削記又謂百非者此於有無一異四句上明之謂有非有亦有亦非有非有非非有為一四句無等例此共成十六又過現未來各有十六成四十八已起未起各四十八並根本四都成百非也若據序文絶其增減則約四謗以明四句一執有增益謗二執無損減謗三執亦有亦無相違謗四執非有非無戲論謗此云增減即四謗之二也今由心通法通絶慮忘言枝葉百非皆泯由根本四句頓亡故得下故者所以之稱得者獲之在己也由前己性心通法通既覺既悟所以獲得藥病泯而靜亂融也此文以靜定喻藥以動亂喻病斯則隔句會別歸總謂能藥所病雙泯則證入玄宗靜性亂相俱融則復歸法界竊見者謂私竊見大經教義也玄綱浩浣見能詮教也浩浣水之汪洋貌故大疏云教海之波瀾浩浣妙旨希微見所詮義也希微即希夷也故般若論云契希夷之境詎究其源釋上能詮詎豈也水之初出曰源罕窮其際釋上所詮罕少也至極曰際真空即能觀之智故滯於心首實際即所觀之境故居於目前且真空無念念起恆為緣慮實際無形形生翻作名相故寶藏論云真智隱於緣慮之內法身隱於形㲉之中法身即實際之異名統收謂總攝也玄奧即前玄綱浩浣矣囊括猶包結也大宗即前妙旨希微矣出經卷於塵中即大經卷塵含經卷喻文有二段初法經云佛子如來智慧無所不至何以故無一衆生而不具有如來智慧疏云喻於佛性通平等智所以得知佛智遍者無一衆生不有本覺與一切佛體無殊故但以妄想顛倒執著而不證得謂倒故不澄豈得言無如壯士迷故額珠豈是膚中無寶若離妄想一切智自自然智無礙智則得現前謂若先無離倒寧有既離倒現明本不無如貧得珠非今授與自然智者自覺聖智也無礙智者始本無二絶二礙也二喻佛子譬如有大經卷喻佛智無涯性德圓滿量等三千大千世界書寫大千界事一切皆盡乃至書寫其量悉等書寫一一各稱境者智如理故此大經卷雖復量等大千世界而全住在一微塵中潛一塵者略有三義一妄覆真故二小含大故三一具多故如一微塵一切微塵皆亦如是一切塵者無一衆生不具佛智故時有一人智慧明達具足成就清淨天眼見此經卷在微塵內以精進力破彼微塵出此經卷令得饒益三合如來智慧亦復如是無量無礙普能利益一切衆生合上書寫多事具足在於衆生身中但諸凡愚妄想執著不知不覺衆生身及妄想俱合上塵爾時如來以無障礙清淨智眼普觀法界一切衆生而作是言奇哉奇哉此諸衆生具有如來智慧愚癡迷惑不知不見我當教以聖道等如來合上一人智眼合上天眼是皆於經益物也上來具引經疏一一注釋者蓋圓覺廣略二疏禪詮觀門兩序並撮略引經而圭峯釋之與清涼本疏或異下文賢首再引偈文而釋義亦略故今經疏具書所冀後昆詳而覽焉轉法輪於毛處者大經偈云一毛孔內難思剎等微塵數種種住一一皆有遍照尊在衆會中演妙法又如善財求友最後至普賢菩薩微細觀察普賢之身見一毛孔中有不可說不可說諸佛剎海乃至善財所見佛剎微塵數諸善友往詣親近積集智慧比此暫見普賢所得百分不及一乃至尼沙陀分亦不及一善財從初發心乃至普賢於其中間所入剎海相續不斷今於普賢一毛孔中一念所入過前不可說不可說倍如是盡未來際猶不能知一毛孔中種種剎海佛海菩薩衆會海既云佛海衆會海豈非轉法輪於毛處耶明者德隆於即日示其頓機也行願疏云得其門則等諸佛於一朝梵行品云若諸菩薩能與如是觀門相應於諸法中不生一解一切佛法疾得現前初發心時便成正覺成就慧身不由他悟此亦無心體極一念便契佛家昧者望絶於多生示其漸根行願疏又曰失其旨則徒修因於曠劫出現品云設有菩薩百千億劫具行六波羅蜜若不聞此如來不可思議大威德法門或時聞已不信不解不順不入不得名為真實菩薩此亦有作之修多劫終成敗壞也會旨山嶽易移喻前頓機無相云妙悟通衢則山河匪壅山即嶽如泰山為東嶽乖宗錙銖難入喻前漸根無相又云迷名滯相則絲毫成隔八銖為錙二十四銖為兩輒者專也旋披謂遍尋也往誥即晉譯之經誥者告也告示令曉也覿謂遠觀也舊章即古之章疏章者明也各明其義也備三藏之玄文者夫經律論之三藏即戒定慧之三學下之第四門明四種行德即戒學也第五門入五止即定學也第六門起六觀即慧學也然此觀門正攝慧學兼收戒定正攝慧學者此有二說一約本文別舉六門通為一觀二依別録謂發心修時曰觀任運成行曰慧故以慧學為正也兼收戒定者謂先以四種行德為方便次以五止為造修故戒定為兼也又若本文多翻問答數引起信為證則正屬論藏若曉兼正則經律二藏從而可知矣又復應知三藏約法二藏約人今茲觀文約人則正屬菩薩藏兼攝聲聞藏以下文明化教普代衆生受苦等即菩薩藏五蘊無主明人空等即聲聞藏制教中引梵網經四分律皆菩薩藏為正聲聞藏為兼若例終南觀文與此大異彼觀約人正為菩薩則無聲聞藏約法則有經論二藏無其律藏何者彼明三重觀門則慧學為正定學為兼而不說四種行德故無戒學也憑五乘之妙旨者乘以運載為義此五力有大小載有遠近一人乘謂三歸五戒運載衆生越於三塗生於人道二天乘謂上品十善及四禪八定運載衆生越於四洲達於上界三聲聞乘謂四諦法門四緣覺乘謂十二因緣法門皆運載衆生越於三界到有餘無餘涅槃成阿羅漢及辟支佛五菩薩乘謂悲智六度法門運載衆生總超三界三乘境至無上菩提大般涅之彼岸若推觀中五乘之義甚隱今以二義通之一據現文互攝二依大疏寄乘然觀中現文唯明三歸五戒是出苦海之津梁趣涅槃之根本出苦海即攝前二謂人乘天乘也趣涅槃即攝後三謂聲聞緣覺菩薩也故先據現文互攝以通之若依清涼十地疏文初歡喜地二離垢地三發光地此三寄世間人天乘四𦦨慧地五難勝地六現前地七遠行地此四寄出世間三乘故後依大疏寄乘以攝之繁辭必削下如漢書衛青傳削則削筆則筆削謂刪去筆謂增益今云繁辭必削所謂刪去也缺義復全所謂增益也雖則創集無疑縱也況乃先規有據奪也創集者創初集會也如帝心為觀集義不集文也無疑者文中子曰窮理盡性吾何疑今集先聖規準之言而為據依故絶枝辭周易云中心疑者其辭枝窮茲性海下謂覺性如海語其深廣也妙行如林言其高聳也參而不雜釋上別舉六門一際皎然釋上通為一觀謂一真實際皎然明白有謂通為一觀總號還源斯亦有理冀返迷方者如人迷東往西冀望返歸也情同曉日者情法也日喻也夫觀心發明則情計盡遣其猶曉日騰輝則瞑霧頓祛佩道猶負道也佩者玉之帶禮曰凡帶必有佩道者性德之本斯須不可離之非佩而何君子者仲尼謂魯哀公曰言必忠信而心不妄仁義在身而色不伐思慮通明而辭不專篤行信道而自強不息此君子儒也今亦爾所謂名必副實而心不妄戒法在身而色不伐矜伐定慧更資而辭不專力傳遺訓而自強不息此君子僧也俯而詳焉者惟義學君子僧俯心從道廣而行之詳者廣也焉者語絶之辭初列名然此六門生起有緒生佛迷悟莫先本體故初授之以顯體也體性開發存乎妙用故第二授之以起用也依於妙用塵塵普周故第三授之以示遍也依能遍境而修行業故第四授之以行德也行德在躬以止調心故第五授之以大止也止門雖寂觀心常照故第六授之以妙觀也一顯一體要其大旨即華嚴一真法界也二起二用初海印常住用明自性深廣二圓明自在用辨隨緣成德三示三遍一普周法界遍明塵性依真二出生無盡遍明依真起用三含容空有遍明體用交參四行四德一妙用無方德多示悲心利他二住持有則德多誡智體自利三柔和質直德悲智雙流自他俱濟四代生受苦德唯大悲利他普救群品五入五止一照法離緣止正顯法空二觀人寂怕止兼明人空三性起繁興止會緣歸寂四光定顯現止寄功忘照五理事玄通止寂照融泯六起六觀一攝境歸心觀顯出法身二從心現境觀修成報身三心境圓融觀法報無礙四智身影現觀一智現多五身入鏡像觀多身入一六主伴帝網觀一多同時身智無盡然此六重觀即賢首品中明普賢德遍一切時處無方大用十三昧門一圓明海印三昧門二華嚴妙行三昧門三因陀羅網三昧門四手出廣供三昧門五現諸法門三昧門六四攝生三昧門七俯同世間三昧門八毛光照益三昧門九主伴嚴麗三昧門十寂用無礙三昧門若以六重觀門攝此十門三昧者一顯一體即攝第一圓明海印三昧門以下文依名別示中謂若據一體為名即是海印炳現三昧門又二起二用初海印森羅常住用引經二偈亦攝第一圓明海印三昧門二法界圓明自在用引經二偈即攝第二華嚴妙行三昧門此依清涼科經攝之又上四偈中復攝三門一攝第四手出廣供三昧門以正引偈云嚴淨不可思議剎供養一切諸如來今第四門偈謂能以一手遍三千普供一切諸如來二攝第七俯同世間三昧門以正引偈云或現童男童女形隨其所樂悉令見今第七門偈謂或現梵志或國王人天等類同信仰三攝第八毛光照益三昧門以正引偈云放大光明無有邊度脫衆生亦無量今第八門偈謂放大光明不思議令其見者悉調伏三示遍即攝第三因陀羅網三昧門以文中謂一塵既具當知一一塵亦爾今第三門偈云如一塵中所示現一切微塵悉亦然四行四德攝其二門一攝第五現諸法門三昧門以四德中具明四攝也今第五門偈謂菩薩住在三昧中或以四攝利益門二攝第六四攝攝生三昧門以下文依名別示中謂若準四德為名即名四攝攝生三昧門五入五止即攝第十寂用無礙三昧門依名別示中謂若約五止而言即為寂用無礙三昧門六起六觀中主伴互現帝網觀即攝第九主伴嚴三昧門謂文中以自為主望他為伴如善財合掌在彌勒前今第九門偈云譬如明月在星中菩薩處衆亦復然此中引經或取文義相類故其句偈有前後不若觀舊疏但將二起二用對初之二門下之八門皆無攝屬是知華嚴奧旨將興賢首不得不作賢首遺風將絶清凉不得不生庶習茲觀者推經考疏則合十門之三昧為六重之觀法無以尚於此矣初通顯自性文有四節初牒然此下釋體字從本下釋自性清淨性體下釋圓明言如來藏中法性體者法性即止自性清凉大疏謂起信明一心即如來藏含於二義一約體絶相即真如門二隨緣起滅即生滅門今文雖顯一心法界而引論文皆約體絶相也又圭峯禪詮序謂況此真性是衆生迷悟之源故名如來藏亦是萬法之源故名法性此則法性與如來藏體同名異也隨流加染者謂迷之則生死無窮返流除染者謂解之則廓爾大悟真性離此故云不垢不淨也在聖體即踞涅槃岸處凡身即居生死流真性絶流故云不增不減何者欲言其增同如絶相欲言其減幽靈不竭欲言其垢萬纍斯亡欲言其淨不斷性惡口欲談而辭喪心將緣而慮亡亦通果分不可說也雖有隱顯下躡前起後也隱即躡前凡身起後煩惱也顯即躡前聖體起後智慧也非生因之所生者大疏云生因所生為緣如種生芽也唯了因之所了者了因所了為因如燈照物也是知生因即緣因同前五度了因即智慧也演義文云其嚴身華亦喻了因其引果花亦喻生因嚴身唯約圓融引果兼於行布若了斯旨生了彌顯起信下諸句皆引彼疏注之真如自體上體下用有大智慧光明義本覺智明遍照法界義本覺顯照諸法真實識知義顯照之時無倒自性清淨心義性離惑染此下引經論多從義勢注之欲其文旨明白灼然依體起二用者以前文顯一體即果海不可說今起二用即因門可說也一海印森羅下謂海印現象森然羅列也常住用者起信云得見心性心即常住後疏釋云無明風止性海浪息湛然常住也真如者體非僞妄曰真性無改易曰如本覺即法身真覺理非新成故云本也論云依此法身說名本覺妄盡心澄萬象齊現者前文謂觀者妄盡智泯本覺真性與萬法融通者亦取此也猶如大海因風起浪即起信真隨妄轉喻也若風止息海水澄清即起信息妄顯真喻也無象不現合法中末句無量功德藏者彼疏釋云謂此法身如來藏中含攝薀積無邊恆沙性功德故法性二字前文已釋言一下亦起信文也彼云所言法者謂衆生心疏釋曰出其法體也是心即攝一切世間出世間法疏謂辨法功能以其隨染成於不覺則攝世間法也不變之本覺及反流之始覺則攝出世間法矣即是一法界者謂無二真心為一法界而此非算數之一謂如理虗融平等不二故稱為一依生聖法故云法界大總相法門體者二門之中不取別相門於中但取總相然亦該收別盡故云大也此一法界舉體全作二門為顯此義故云體也軌生物解曰法聖智通游曰門唯依下論云一切諸法唯依妄念而有差別若離心念則無一切境界之相此云若離妄念唯一真如者有其二意一符上文一法所印二連下句海印三昧大疏引經謂海印三昧如淨水中四兵像象馬車步乃至莫不皆於水中現又云海有希奇殊特法能為一切平等印衆生寶物及川流普悉包容無所拒大集經謂如閻浮提一切衆生身及餘外色如是海中皆有印像以是故詺大海為印菩薩亦爾得大海印三昧已能分別見一切衆生心行於一切法門皆得慧明是為菩薩得海印三昧見一切衆生心行所趣然此經文多同出現品但出現品現於四天下像大集唯一閻浮以此為異考茲一唱觀文唯海印三昧出華嚴次經云下出法句經餘皆起信況前明一體彼示三遍四德五止六觀一一引論為衡鑑斯蓋帝心冥挾起信集三重法界於前賢首顯用論文述六門還源於後推是言之以馬鳴大士為吾宗初祖其誰謂之不然華嚴下此之二偈正引第一圓明海印三昧門前之一偈明其業用周遍即類於餘衆後之一偈總結大用所依即海印三昧摩睺羅伽此云腹行即蠎蛇之屬文有等字以偈中但標六類等取餘六一夜叉二乾闥婆三迦樓羅四緊那羅五人六非人二法界圓明自在用是華嚴三昧者即賢首品第二華嚴妙行三昧門晉經云一切自在難思議華嚴三昧勢力故此即據行為言名華嚴三昧然妙行有五次文釋之離世間品云入廣大三昧名佛華嚴大疏云萬行披敷嚴法身故三昧此云等持謂遠離沉掉平等治心趣一境故曉法師曰三昧此翻正思正謂正審揀於邪慧也思謂思察揀於昏沉也廣修萬行稱理成德釋自在用也普周法界而證菩提釋法界圓明後釋華嚴二字華有結實之用者行願疏云表於法界含性德故行有感果之能者疏又云行為生因起正覺故託事釋有結實也表彰釋行有感果也行成果滿契理稱真者此展經題以釋嚴字謂行成果滿即佛華嚴能證人也契理稱真即大方廣所證法也性相兩亡唯一真界故前序云泯性相而歸法界能所俱絶造極大宗序又云消能所以入玄宗顯煥炳著皆光明貌良以下反釋前文曲為三釋初真性所流行釋二引攝輪文同釋三約承上起下釋非真流之行無以契真者謂真外有行理不遍故何有飾真之行不從真起者謂行外有真事無依故此約真性所流行釋又此二句全同攝論所謂無不從此法界流即何有飾真之行不從真起論又云無不還歸此法界即非真流之行無契真此約攝論文同釋也此則下則者承上之辭則重釋前二句也謂真該妄末行無不修釋前何有飾真之行不從真起妄徹真源相無不寂釋前非真流之行無以契真此約承上起下釋也又後之二句略申二解一類義海二引本文類義海者謂真該妄末行無不修即觀空萬行沸騰也妄徹真源相無不寂即涉有一道清淨也依本文謂真該妄末行無不修即行從理起理徹於事也妄徹真源相無不寂即理由修顯事徹於理也出下文玄通上然而行法幽微直釋難曉故引教義為據勿謂繁而寡要華嚴下此之二句正引第二華嚴妙行三昧先明五種行後結上所依嚴淨不可思議剎一淨土行供養一切諸如來二供佛行放大光明無有邊三敬衆行度脫衆生亦無量四悲濟行施戒忍進及禪定智慧方便神通等五十度行兼明神通行等之一字等取十度後三謂願力智也如是一切皆自在結上自在以佛華嚴三昧力總結所依一塵普周法界遍演義鈔謂即大經偈云充滿法界無窮盡也文中先釋一塵後釋普遍攬真謂依真界也經云下華藏品剎自在文也華嚴世界所有塵總中有別一一塵中見法界小能容大寶光現佛如雲集依正互融此是如來剎自在結歸果德圭峯釋第二句則云見四法界此文雖引一偈意取上半以證前文下半因便來耳二者一塵出生無盡遍演義云出現無盡若高山之出雲自體有常樂我淨義性德圓遍清涼不變自在義性德無遷具足如是過恆沙功德性德恆沙不離真體乃至無有所少義聖證性已性德本有經云下即義引晉經自大起小明其依正二皆具性德謂山河最大樹林漸小塵毛極小當知一塵下文有十一對一塵普周法界即理也一塵出生無盡即事也上一對為總謂合前二遍下十對為別即人能證也即法所證也即彼涅槃也即此生死也即依淨穢土也即正凡聖身也即染煩惱也即淨菩提也即因有學也即果無學也即同同類衆也即異異類衆也即一不變也即多隨緣也即廣容十方剎也即狹不壞一塵也即情有知也即非情無知也即三身同教一乘也即十身別教一乘也三身謂法報化十身謂一衆生身二國土身三業報四聲聞五緣覺六菩薩七如來八智九法十虗空此則融三種世間為十身七八九即智正覺世間第二第十即器世間餘五有情世間理事無礙者謂理事鎔融存亡逆順通有十門事事無礙者謂遍攝無礙交參自在亦辨十門義或謂吾祖造此觀門宗賢首一品則局十門三昧也帝心集法界觀宗華嚴一經則通七處九會也若觀此文辨理事無礙周遍含容豈局賢首一品哉所謂終日載天不知天之高長年履地不知地之厚者也法如是者法爾而然也十身互作下文具釋唯普眼之境界者華嚴䇿林曰亦賢首造全色為眼恆見色而無緣全眼為色恆稱見而非我非我離於情想無緣絶於貪求收萬象於目前全十方於眼際是以緣義無盡隨見見而不窮物性叵思應法法而難準法普則眼普義通則見通體之自隱隱照之遂重重其唯普眼之境界乎如上事相下指上一塵即一切法也相容謂一望多即一容一切如東鏡容九鏡也相攝謂多望一即一切攝一如九鏡攝東鏡也重重無盡者大疏云一入一切如性之遍一切入一如性之包若秦鏡之㸦照猶帝網之交光故云重重無盡經云下引此一偈證其二義一證前唯普眼之境界以偈文末句是普智眼天王所得解脫門故二證後重重無盡境界以偈文初句有無盡海之言耳問中躡前即理即事一對之總也故先述意謂理與事而融即文隨義而㸦通今時下為衆敘疑且於一塵之上列其十疑束為五對初染淨對二真俗對三生死涅槃四煩惱菩提五小乘大乘答中大智圓明而為能證覩纖毫而周性海謂正中見依也真源朗現而為所證處一塵而耀全身謂依中現正也萬法起必同時即寂寥於萬化之域一際理無前後即動用於一塵之中體無遍計者謂所計有法一切皆亡即悟我空小乘法也無生無滅者謂性無生滅依他似有有同幻化即悟法空大乘法也唯以一塵字解釋者如吾祖述華嚴義海唯以一塵剖為百門古人謂圓機覩一乘法界知春秋亦可高例宜深思之者終南觀謂深思令觀明現是皆祖祖同辨勸修成行耳經云下引偈二句意取後句結例立名一塵含容空有遍者演義云非滅盡法猶虗空之常住此則合前二遍成此第三謂此文塵無自性即前普周遍中塵無自性攬真成立故云即空也此文幻相宛然即前無盡遍中依真起用亦復萬差故云即有也良由下顯色空交徹觀色下示無住行謂不住生死異凡夫不住涅槃異小乘由了色空之境不二所以悲智之念不殊言真實觀者以緣起悲智跨末章悲智無盡以結觀名也乍觀斯文似當中道第一義觀細詳前有出生無盡後有釋義結名皆示周遍含容若以真實即是中道何以次文辨塵含十方為大不思議念包九世為十玄門故知不然寶性論即堅慧菩薩所造道前菩薩者玄鏡謂地前菩薩有三種空亂意以不了知真如來藏生死涅槃二際平等執三種空一疑空滅色取斷滅空此如穿井除土出空取其頑空也二疑空異色取色外空此如墻處不空墻外是空亦取斷空也上二依圭峰釋三疑空是物取空為有彼謂別有一物是於空體故取為有也依清凉解今此下推此一科義涉二途一釋前三疑二雙示揀顯釋前疑者即是揀空亂意菩薩計三種空也謂色是幻色必不礙空釋前一者疑空滅色取斷滅空空是真空必不礙色釋前二者疑空異色取色外空若礙於色即是斷空若礙於空即是實色釋前三者疑空是物取空為有三疑既遣則一塵包遍義見次文二雙示揀顯者終南觀中以會色歸空明空即色皆揀情顯解故圭峯注云若色是實色即礙於空空是斷空即礙於色今既色是幻色故不礙空空是真空故不礙色但此文約次第釋前三疑故先明空幻後彰斷實彼觀約次第成其第三空色無礙觀故先遣斷實後顯真幻文雖前後義乃同時一家揀顯殊塗同歸然會色歸空觀揀外道小乘皆有斷滅明空即色觀揀凡夫及初心菩薩皆執實色此文何故唯揀空亂意菩薩耶今但約所計斷空實色是同不以能計之人有異于何不可或謂彼觀唯以真幻揀於斷實此文何以舉一塵含容空有耶答曰夫迷名執相則終歸邊見了事即理而中道可期且幻色豈非一塵乎真空豈非法界乎如下文謂無生既顯幻有非云攝法界而一塵收舉一身而十身現亦以幻色即一塵無生即法界豈以名殊而異於物哉塵含十方即大不思議也龍樹謂塵含法界量等虗空即指華嚴為大不思議毛吞巨海芥納須彌即指淨名為小不思議念包九世即十玄門之一也金師子章云剎那之間分為三際謂過去未來現在總有三三之位以立九世促即一念也延即九世也正當十玄門中十世隔法異成門也殊勝微言纖毫彰於圓教者即經云無量無邊法門海一言演說盡無餘奇特聖衆輕埃現於全軀者即經云於一塵中塵數佛各處菩薩衆會中此義遍於大經避繁不引逈超言慮之端者圭峯云法無名相非心思口議釋上纖毫彰於圓教也透出筌罤之表者周易云得魚亡筌得㝹亡罤釋上輕埃現於全軀也經云下即出現品塵含經卷喻此並次科但申其大意具釋如前序中引長行及清涼大疏今此八句即重頌也隨緣妙用德中群生即衆生變其文耳衆者不一之稱漢書中去呼今釋教相承平呼根器不等受解萬差者以根有大小之殊解有明昧之異樂欲不同應機授法者上機授之以六度中根授之以十二因緣下根授之以四諦次下二句即維摩經應病與藥謂用諸觀智之藥治諸不善之病令得服行謂斷二障之惑證三乘之果維摩具云維摩羅詰秦言淨名垂裕記云淨即真身名即應身真即所證之理應即所現之身生公疏云秦言無垢稱其晦迹五欲超然無染清名避布故致斯號此則疏記翻名不同所以釋義有異具明斯義者彼經又云而生五道以現其身為大醫王善療衆病又以下文有五對一悲智對二空假對二理事對四真俗對五本末對初對有悲故不為無邊所寂名曰隨緣有智故不為有邊所動名為妙用此中妙用之言皆是即體之用荷澤云即用而體自知即知而體自寂名說雖是體用一致良以下初四句約法示體用次四句約法喻雙釋初法無分齊語其體也起必同時辨其用也真理不礙萬差體即用也顯應無非一際用即體也次云用則波騰鼎沸釋前起必同時全真體以運行釋前真理不礙萬差體則鏡淨水澄釋前法無分齊舉隨緣而會寂釋前顯應無非一際又總上八句約法喻隔句雙釋體用謂法無分齊體則鏡淨水澄起必同時用則波騰鼎沸真理不礙萬差全真體以運行顯應無非一際舉隨緣而會寂若曦光之流彩妙用也無心而朗十方隨緣也華嚴經云赫日揚光輝十方靡不照如明鏡之端形妙用也不動而呈萬像隨緣也但涅槃論云明鏡之像對之不知其所以來皆約結名以釋二威儀住持下左傳曰有威而可畏有儀而可象故謂威儀夫戒者威儀也威儀者德之表也故曰住持有則德然大乘八萬小乘三千諸教亦㸦通如楞嚴優波離云三千威儀八萬微細長水義疏謂二百五十各有四儀復對三聚故成三千復以三千配身口七支四分煩惱轉成八萬四千今舉大數耳此大乘通小教也又三千威儀經云其中出家者次應捨執作緣務具受八萬四千向道因緣此小乘通大教也為住持之楷模者高僧傳十科一譯經二義解三習禪四明律五護法六感通七遺身八讀誦九興福十雜科以住持為興福故北山住持行編云夫經律論為住持之教本僧財食為住持之功烈務教而法衆盛矣宣功而金界治矣故使至道淳懿靈神降趾此住持之法度也楷模二字皆訓法廣雅云楷模品式法也整六和之紊緒者梵語僧伽此翻衆和合有六種一身和同事二語和同默三意和同忍四戒和同修五見和同解六利和同均紊運切亂也緒謂絲緒出三界之梯橙者纂要以戒定慧能出欲界色界無色界疏云戒出三塗定出六欲慧出三界梯喻橙自下升高也越苦海之迅航者分改變易二種生死深廣如海迅疾也航亦舟也字統云單船曰舟並船曰航即兩船並載者此之一句並次二句與心經疏序大同拯物導迷莫斯為最者結歎上文謂拯救導引物機迷惑莫若威儀有則為其最要然領徒之士泛受則人喜陵犯嚴毅則物自肅然末代住持宜其嚴而少受斯又為最矣但語辭以由也金容匿彩下通敘去聖逾遠法道不行匿汝力切隱也彩即毫光故魏刺史云玉毫收彩正聖也木受繩則正后從諫則聖教者效也施而教之便物自效也然有化制二焉經詮理智化教也律詮德行制教也今文多明德行制教歟陵夷亦云陵遲即不進貌發正云以下望高欲上成難云淩遲遠法師云佛法陵遲穢雜日久每一尋至慨憤盈懷文出答桓玄書通惠傳中作夷字與今文同彼云馬令脫轡象闕施鈎不習律難調象馬令教法日見陵夷文出宋高僧傳傳授澆訛者如神清法師引經云若人生百歲不解生滅法不如生一日而得解了之時有比丘承師誤訓誦云若人生百歲不識水老鶴不如生一日而得覩見阿難聞而歔欷上虗音下希音悲歎也往正彼師竟不令改且阿難聖力黨之尚然矧今之世傳授澆訛余奈之何師於己見者禪詮序云今時弟子彼此迷源修心者以經論為別宗講說者以禪門為別法是皆解背真詮師於己見也別録云如洪州禪師云貪瞋慈善皆是佛性有何別者如人但觀涅性始終無異不知濟舟覆舟功過懸殊夫慈善如濟舟之功也貪瞋如覆舟之過也彼謂皆是佛性無別者豈非師於己見乎致使者因他而得故名為致由前傳授澆訛師於己見致使教無綱紀濫挹淳流網之大繩曰綱小繩曰紀濫謬也挹酌也應作淳漓即濃薄之貌謂酌漓為淳以薄為濃大義於是乖矣得失齊舉妄參真淨者迷妄謂之失悟真謂之得今既齊同舉物其猶妄穢雜於真淨矣嘗試論曰且夫人思善道潔已依師近期於立身揚名遠冀於革凡成聖發揮像教垂於無窮又奚有妄穢能參真淨哉故令初學觸事成非者由其得失齊舉所以令其初心學者日乖法則逢事成非向聞有西江商客賽願營齊先示文疏僧無能讀者被商驅之一何可笑後生聞此當寅夜攻學一則不虗受施一則覆庇群僧一則揚名於四方出僧史略南山亦云屢有初心在道觸事未諳曾不尋其教章於法每纏疑網不依經論混雜凡流者起信疏云大乘深旨沉貝葉而不窮群有盲徒馳異路而莫反無相亦謂聖教之所不依明師未曾承受所以混雜汩亂凡夫之情耳自陷陷他者如宋法豐死為不食之鬼巡寺作餓駝聲以專寺任刻薄故也臨卭僧孫民見身如廁持鉢食穢以儉歲刻𣏐減粥故也智壞死作衆奴以寺布借人故也聖壽寺僧清訓念法華經每在送終處於行食者求酒食及飽之以歸一日驟無聲經年不通食漸不通水自去生入餓鬼也上三緣出北山録皆自滔下一緣出寶公注兼滔他有謂道安之門人法遇領徒四百時有一僧飲酒廢夕燒香遇罰而不遣安聞之以筒緘杖寄遇曰此由飲酒者也我訓不勤遠貽憂賜乃集衆命維那行杖至三因立下自咎此亦自陷陷他也人安有言曰汝曹若能修身踐言慎終如始勤爾學問慎爾行藏避惡支如避虎狼事良朋如事父母顧言行而礭乎不拔處貧病而樂以忘憂自然與禍斯違於福斯會慕雪山之求法學善財之尋師智足以照惑慈足以攝人此又自利利他也瑜伽此翻相應大沈謂昏沉也小浮謂掉舉也寶藏論云夫入道之遙內虗外淨其意不沈其心不浮不出不入湛寂自如常住正念一句文連上下謂以觀破昏沉以止破掉舉止觀雙運永離二過即常住正念此文連上也又常住正念根本眷屬即文連下也小乘四重為根本餘篇皆眷屬大乘根本眷屬次文示之或可定共是戒眷屬定共戒者依定心發不復起惡助於律儀道共戒者道即慧也依分別發揀擇善惡防發功強正資攝善兼助律儀由是定道俱名戒也淨修梵行通結上文華嚴經即晉經賢首品梵網者即大乘菩薩戒吾祖賢首有疏具明十重四十八輕此以十重為根本四十八輕為眷屬余昔領衆青憞梵剎每於半月差僧誦十重戒蓋遵佛祖之遺範也嘗觀靈庾集引掉群南有靈鷲山大長老律師胡民領徒而夏安居說戒夜人數則定籌數每過衆莫識其然夏既末二三胡沙門出山至路與穡人揮手根別律師聞而奔走其徒四馳其去則不遠然而莫得見之矣入大乘論云賓頭盧羅睺羅等一十六大阿羅漢恭承遺顧遊行人里是以僧居每於說戒解夏日不得不清嚴法字整衆翼翼儼若在乎聖人之前也體無毀禁者彼論云以知法唯無染離五欲過故即此文體無毀禁所謂下具足應云不殺不盜不淫不兩舌不惡口不妄言不綺語遠離貪嫉欺詐諂曲瞋恚邪見彼疏釋云即攝律儀戒也亦應下至所制禁戒即攝善法戒憒閙上告內切下女教切常護下至妄起罪過即攝衆生戒也準上論文等雖通攝前出生無盡遍等文此乃起信發心之相問答除疑之辭乃至次文喻合二科皆彼論勢但彼廣此略摩尼此翻離垢言此寶光淨不為垢穢所染又翻增長謂有此寶必增長威德也應法師云末尼謂之總名有云或山或海之珠圭峯謂摩尼珠中必無黑等色是也五衆者一比丘衆二比丘尼衆三式叉摩那衆此云學法先學本法後受尼戒四沙彌衆此云息慈息滅染情慈愛衆生五沙彌尼衆在家身纏俗網者涅槃經云在家迫逼猶如牢獄出家虗曠猶如虗空自有嚴科者即篇聚也篇謂五篇初波羅夷二僧伽婆尸娑三波逸提四波羅提提舍尼五突吉羅聚謂六七於五篇中加偷蘭遮名為六聚開突吉羅為二謂之七聚若翻梵從華廣在律宗略如令摸鈔然則受三歸持五戒而出苦海趣涅槃者約始修終證之言故古詩云方知萬里水初發濫觴源此言雖近可以例遠毗尼亦云毗奈耶正翻調伏調謂調練三業伏謂制伏過非身三等七衆於前五衆加優婆塞優婆夷二衆耳萬善藉此而生者萬善即萬行此之一字指三歸五戒言萬行藉三歸五戒而生也實佛法之平地者經云戒如平地衆善由生又地有生成荷載之義謂十地聖人修生萬德厚載恆然故云平地尸羅此云淨戒標次文戒為定體也三昧此云正思起下句慧為定用也故其三學皆一乘別教此文四種行德即戒學次入五止即定學後起六觀即慧學故大疏序云尋斯玄旨却覽餘經其猶杲日麗天奪衆景之耀良在此矣若夫一乘同教三學者戒學有三一攝律儀戒二攝善法戒三攝衆生戒定學有三一安住定二引起定三辦事定慧學有三一人空慧二法空慧三俱空慧廣辨三九如永嘉奢摩他篇然始教三學與其同教但即不即為異小乘三學即持五篇淨戒修九次第定發人空淺慧三學圓備即證菩提與大宋僧傳引論證三菩提其文稍同彼云戒如捉賊善擒制也定如縛賊用機械也慧如殺賊清道路也以此成功立效克取空盡三菩提者決達清靜之域也四分者業疏序云據說之章段也若約六十卷收之即大僧戒本二十卷為初分尼律下十五卷為第二分安居法下十四卷為第三分房舍法下十一卷為第四分怨家有二怨與冤音義同一缺命負財二天魔外道以戒淨故彼無所為故云不能近也被訶者如六群比丘屢有所犯多被居士舉過譏訶遂往白佛佛乃集衆種種訶責三柔和質直德中文有三對初悲智真俗對約無住行二不變隨緣對約淨緣起三去惑就理對唯辨柔和二字柔則伏滅煩惱者此有二位制伏煩惱位處三賢斷滅煩惱位居十聖和則順理修行亦有二義一事和見鬪諍人諫勸令捨不自稱譽卑遜敬物二理和見退菩提心人殷勤勸進善能分別菩提煩惱平等一相言行相符者言以顧乎行行以顧乎言即如說而行也儒典等云先行其言而從之又曰言篤信行篤敬言行君子之樞機也寄語來者願以言行拳拳介懷但為正業調生者但獨正聖也言獨為聖教事業調伏衆生也又正業自行也調生利他也謂質直者但有所為或語默或出處皆不失正行業用然後可以調伏群生也為字通去平二聲初解去呼次解平呼又前文一對唯辨柔和此文唯明質直故曰下總前結名四普代衆生受苦德文有三聚淨戒廣利群生即攝有情戒普令斷惡即攝律儀戒備修萬行即攝善法戒速證菩提即三聚果其中冤親平等即不生憎愛也救贖一切受苦衆生者大經云菩薩見有獄囚五處被縛受諸苦毒或以刀屠割或以火焚燒菩薩見已語主者言如是等苦可以與我設過彼苦阿僧祇倍我亦當受令彼解脫故上句云以身為質質猶當也如燕太子丹質於秦不希望毛髮報恩之心者經次文云我為救護一切衆生發一切智菩提心故若望報恩則同傭作華嚴下即華藏世界品普賢菩薩重頌因相疏釋云辨因招果也念念遷流名之為苦者即三苦中行苦也了蘊空寂下謂了悟五蘊猶如聚沫浮泡陽焰芭蕉幻化故經云一切諸法性本自空故云自性本無也問意謂衆生數量無邊何以菩薩一人而能普代耶答中大悲方便力出代苦之由也不了業體從妄而生者行願經云若此惡業有體相者盡虗空界不能容受故云從妄而生也教令修止觀即起下文五止六觀之張本也因果喪亡等謂因亡即無業果喪即無苦於不堅堅覺者不堅即五蘊覺猶執也即前云妄執遷流也謂五蘊不堅實衆生執堅實故次句云深住於顛倒也離煩惱者煩惱即根本煩惱所惱即隨煩惱根隨皆離即得最上菩提故圓覺云離幻即覺以菩提翻覺耳五止中性相俱泯者相泯釋當相即空性泯釋相盡心澄體周法界謂絶諸對待也入無入相下謂無能入所入之相名為真入即同清涼云冥於心體曰入華嚴下晉經寶王性起品文如來深境界其量等虗空謂寂寥虗曠冲深包博也一切衆生入而實無所入謂總該萬有即是一心也入諸無相定即觀之止也見諸法寂靜即止之觀常入平等故謂不取真不棄假也敬禮無所觀謂靈明性體一相無相也又尚無能禮之凡豈存所禮之聖故圓覺疏第七實相禮云若內若外若凡若佛同一實相以文殊云不生不滅故敬禮無所觀鈔釋云入佛境界經中文也上之三句亦取圓覺疏意以一心三觀釋之一切衆生無不在如來境界中者大疏云凡厥生靈皆含佛智更無可入者淨名謂衆生即寂滅相不復更滅此同清涼云入者了悟解達之名也如人迷下舉喻合法二科皆用起信會相入實依覺成迷二段論意今亦依彼釋之論曰如人迷故謂東為西方實不轉即會相入實也西即是東更無別東論云若離於方則無有迷即依覺成迷也衆生迷故下論云衆生亦爾無明迷故謂之動念心實不動即會相入實也妄即是真更無別真論云若離覺性則無有迷即依覺成迷也入與不入者言入約迷不入約悟一心法界無衆生迷無諸佛悟故云本來平等經云平等真法界佛不度衆生良有由矣起信下義涉兩處論文一心源無念二方便正觀論云若有衆生能觀無念者則為向佛智即心源無念也論又謂若能觀察知心無念即得隨順入真如門即方便正觀矣然觀中前後引論義涉兩處文勢皆然一照法清虗離緣止中謂真諦下釋照法真俗下釋清虗能緣下釋離緣心境不拘體融虗廓正示止門若發文駕義講者委陳下文多爾尋之自曉維摩下即淨名居士斥目連章彼云夫說法者當如法說法無衆生離衆生垢故乃至法不屬因不在緣故然則推析因緣蓋就觀門辨之今造詣止門故因緣雙不也二觀人寂怕絶欲止中謂五蘊和合名之為人蘊無主宰謂之寂怕絶欲者不執五蘊法也前文謂初止照法正顯法空此文觀人兼明人空蓋謂此也三性起繁興止中真如之法法爾隨緣通釋性起繁興萬法俱興法爾歸性別釋止義從無住本立一切法者文含二意一證依體起用名為性起二證真如之法法爾隨緣天台釋云即是世間出世間有為無為一切諸法皆從無住本立廣釋如彼要其所歸不出性起四定光顯現止中有本作錠錠即燈也今云定光法喻齊舉謂定能發慧猶燈現光白淨寶網下晉經云白淨寶網轉輪王新經隨好光明功德品云金網轉輪王疏釋云彼白淨寶但是所等則金網無失若取十地為清淨金網正同瓔珞經中以無畏珠寶而為輪相新舊二經並無萬字謂佛𮌎前作此字卍音萬以表因人位極智周具萬德耳體性明徹釋定光十方齊照釋顯現無思成事釋無念也雖現奇功心無念慮克示正義然以十地菩薩示初心修止者舉果該因也次文以衆生入此大止妙觀即舉因攝果也下文謂初心正覺攝多生於剎那十信道圓一念該於佛地皆明因果交徹七寶者一女寶二輪寶三珠寶四兵寶五藏寶六象寶七馬寶業性亦如是者隨好品中觀諸業性非十方來止住於心從顛倒生亦來處不可得也此文業性通諸善業不為二乘下大經云譬如日天子出現世間不以閻浮提樹崇巖邃谷塵霧煙雲之所覆故隱而不現即喻此修止菩薩不為二乘偏真外道邪見塵霧煙雲之所障蔽也五理事玄通止中㸦隱㸦顯者由幻相之事顯則理隱也無性之理顯則事隱也無性謂無質礙之性也㸦存㸦奪者由理存故奪事則理徹於事也事存故奪理即事徹於理也體周法界理玄也萬行紛然事玄也悲智雙融明其通義性相俱泯克示止門六觀中問準上義理即一體二用三遍四德然此敘義雙問不於入五止前發問者謂前文通敘入義已引起信為標準今就起六觀前為問蓋引教雙答並通後學妨亦導起信之文意明始自一體終乎六觀皆憑馬鳴奧旨欲使學者推論明觀虗己求宗無取未習答中即起信對障明俱之文今依彼疏正兼二過釋之對治凡夫住著世間即正治凡夫人法二執貪樂世間也能捨二乘怯弱之見即兼治二乘執五薀法見苦生怖也對治二乘不起大悲狹劣之過即正治二乘狹劣之心令觀衆生起於大悲也遠離凡夫不修善根即兼治凡夫懈怠之心令觀無常策修善行華嚴下即出現品釋悲智無礙行金翅闢海喻也善見云迦留羅者能破三千尋圍即金翅鳥也如經說化生金翅鳥能食四生龍大止妙觀者大經云禪定持心常一緣止即妙觀智慧了境常三昧觀即大止遠公禪經序云禪非智無以窮其寂觀即大止智非禪無以深其照止即妙觀而搏取之喻即智之悲也而為兩翅翅即翼也止觀相須如鳥兩翼車之二輪二輪不具則無運載之功一翼若闕則無淩虗之勢若修下明修止方便略引疏注之住於靜處具有五緣一間居靜處二持戒清淨三衣食具足四得善知識五息諸緣務今但舉初故云靜處端坐調身也正身端直不低不昂不偏不邪正面而住正意調心也意欲令其觀心與理相應自度度他至無上道不依氣息數息觀境不依形骨璅等色青黃赤白四相不依於空不依地水火風空等五相皆是事定所緣之境乃至不依見聞覺知見聞等是散心時所取六塵不復託緣故言不依一切諸想隨念皆除除前諸境更有餘心皆亦遣之亦遣除想所遣既亡能遣不立以一切法本來無想欲順於法性故能所皆不存念念不生念念不滅釋成無想所以此乃即生無生即滅無滅亦不隨心外念境界若心外有實境心緣此境時抑令不緣不可得故然後以心除心論中無然字今既心外無塵即所取無相其能取自然不生何勞後心方更除耶心若馳散即當攝束令歸正念論中即云住於正念初習馳散故攝令住正常勤正念唯心識觀論中即云是正念者當知唯心無外境界文雖有異厥旨大同一切魔境自然遠離以此唯心非彼所知故此是通遣之法故云遠離邪正未分者起信疏依古德略以三法驗之一以定研磨二依本修治三智慧觀察如經言欲知真金三法試之謂燒打磨行人亦爾若欲別之亦須三試一則常與共事共事不知當與久處久處不知智慧觀察今借此意以驗邪正謂定中境相發時邪正難知者當深入定心於彼境中不取不捨但平等定住若是善根之所發定力逾深善根彌顯若是魔所為者不久自壞二依本修治者且如本修不淨觀禪今則依本修不淨觀若如是修境界增明者則非僞也若以本修治漸漸滅者當知是邪也三智慧觀察者觀所發相推驗根源不生見處深知空寂心不住著邪當自滅五當自現故論云以是義故行者常應智慧觀察耳魔網入心即論云勿令此心墮於邪網又無師匠下即五緣中無善知識也四魔一天魔二煩惱魔三陰魔四死魔如起信說者論云或有衆生無善根力則為諸魔外道鬼神之所惑亂若於坐中現形恐怖或現男女端正等相論文甚廣須者自檢即觀之止即止之觀者或問天台以三止對三觀體真止空觀隨緣方便止假觀息二邊分別止中觀今文何以五止即六觀耶答此是觀門大節略以教義通之他宗約一乘同教以三止對三觀本宗約一乘別教如下會名六重三昧六重觀門具六止六觀也或謂下文明示第五多身入一鏡像觀是事事無礙法界第六主伴㸦現帝網觀亦是事事無礙觀若以第五為所證第六為能證則境智冥一亦是五觀對前五止云云者此誠配對能所之學甚昧吾祖觀心之縕末章云此上所述六重觀門始一體終六觀為六重門舉一為主餘五為伴隨入一門即全收法界若合後二境智冥一對前五止應合後之四德對前三遍故知委配昔人謂昧觀心如去燭縱昏情如夜游豈虗言哉何以故下四句懸示六重觀法單合互攝謂初句理事無礙法如是故此之一句合辨第一攝境歸心觀第二從心現境觀何則由事不礙理則攝境歸心也理不礙事即從心現境也法爾而然故云法如是也第二句定慧雙融離分齊故此之一句單明第三心境圓融觀謂以慧融定則心無礙也以定融慧則境無礙也心境廓爾故云離分齊也第三一句一多相即絶前後故此之一句亦合辨第四智身影現觀第五身入鏡像觀謂第四一智現多第五多身入一義乃同時故絶前後也第四句大用自在無障礙故此之一句亦單明第六主伴帝網觀謂以自為主望他為伴是知主者大用自在為義也隨舉一法主伴齊收故云無障礙也噫折四句之道文總六重之妙旨單合亦明儻無義證則何以取信於後裔哉言六觀下然此六門具明法喻謂前三約法以辨心境後三約喻以明性德後學至此彌須留意一家宗極玄妙在茲一攝境歸心觀中三界所有法唯是一心造者造作也即論云三界虗僞唯一心作十地經中亦與論同心外更無一法可得者論云以如來藏無前際故若說三界外更有衆生始起者即是外道經說耳一切分別但由自心者論云一切境界唯心妄起故有由心不起外境本空即論云心滅即種種法滅然三界唯心萬法唯識性相兩宗權實逈異備如華嚴圓覺二大疏此文辨性宗故同起信實教焉論云即唯識中文文有五句前之四句出其四因成唯識心義後之一句正顯識體無生又經即法句文也有法喻合初八句法說未達境唯心起種種分別迷境妄生達境唯心已分別即不生悟境妄滅知諸法唯心便捨外塵相合覺背塵由此息分別悟平等真空正證唯心次二句喻後二句合文並可知由心現境即境不自生由心故現也由境現心即心不孤起託境方生也心不至境謂心如即境謝境不入心謂境滅即心空二從心現境觀中次科云莊嚴報土即依報也對下修成報身即正報也顯出法身亦正報也若對法性真土亦依報今此無文影在次科以成淨土即法性真土也三心境祕密觀中言諸佛證之以成法身次文又謂如來報身其故何耶言以成法身舉所證理如珠之體次云如來報身舉能證智如珠之光然圓宗理智㸦舉無在勿縱常情強分諸異四洲謂東勝身南瞻部西牛貨北俱盧也須彌此云妙高道場儀頌曰妙高四寶為山體閻浮南面吠琉璃北邊黃金東銀體西邊之寶號頗胝䥫圍即鹹海外輪圍山也頌云海外輪山是䥫圍東西南北四洲渚毗盧遮那此云光明遍照謂身智二光內外俱照故盧舍那此云滿淨一切障染若麁若細無不盡故前約德顯此約離障義雖兩途理歸一致就此門中分為四句者依正無礙門也若據諸疏通有六句謂中間二句觀文已引二偈故此但明四句言六句者一依內現依謂塵含世界第六經云如是諸剎土一一塵中現二正內現正謂毛孔中現佛現相品云如來於一毛孔中一切剎塵諸佛坐三正內現依謂毛孔中現剎即觀文引偈身現剎土也四依內現正謂塵中現佛即觀中引偈剎現佛身也五依內現正依謂塵中現佛身及剎如經云一一塵中無量身復現種種莊嚴剎六正內現依正謂毛孔中現剎及佛身如經云一毛孔內難思剎一一皆有遍照尊但以中間第三第四兩句對前文二偈如指諸掌玄談即晉經舊疏四智身影現衆緣觀標名言影現釋義言能鑑皆指喻而能鑑所現皆明一智現多也諸緣相盡如如之境也如如獨存如如之智也有為之法為能含真性為所含真性為能現之一有為之法為所現之多猶如日輪下能照唯一所照益多束為三類一有目二生盲三無情觀文引晉經今會唐經以示益相經云無量衆生皆蒙獲益行者見道居者辦業即此文有目之流無不親見也經云雖未曾見亦得饒益受用種種衣服飲食即此文生盲之輩亦蒙潤益令知時節寒熱之期也經云廓徹虗空生長草木成熟穀稼開敷蓮華即此文草木無清悉皆滋長五多身入一鏡像觀約喻則萬像為能入一鏡為所入約法則多身為能入一身為所入義見次文即事事無礙法界與下文事事無礙觀皆是周遍含容遍攝無礙一義耳或以法界為所證境觀字為能證智恐失交參玄旨矣經云下即第八不動地也具云此菩薩知諸衆生心之所樂能以自身作衆生身國土身業報身乃至虗空身彼經在第四類今順觀文引之又知衆生心之所樂能以衆生身作自身亦作國土身業報身乃至虗空身又知衆生心之所樂能以國土身作自身亦作衆生身業報身乃至虗空身又知衆生心之所樂能以業報身作自身亦作衆生身國土身乃至虗空身釋曰上之四類別顯乃至超過辭疏序云十身歷然而相作亦示此也如是下結成百身以至無盡故大經玄談云即是法界無盡身雲真應相融一多無礙隨舉一身攝餘九身者謂一身為能攝九身為所攝如舉東鏡為能攝九鏡為所攝即交涉無礙門一攝一切也又九身為能入一身為所入如舉九鏡為能入東鏡為所入即交涉無礙門一切入一也余嘗究交涉無礙門第二句以謂圭峯注以文勢反上義旨簡略因推微茲文多身入一鏡像觀則知先祖辭簡義備而廓盡餘惑矣冀諸後昆希心玄趣身分即四支並頭支節即三百六十骨節眼處作耳處佛事即眼能聞聲也舉要言之謂眼能嗅香了味覺觸知法餘五例然法力加持即自力故次文云皆由深定力故得有如是經云下文有四節或以多身作一身或以一身作多身一多相作或以一身入多身或以多身入一身一多相入非一身沒多身生非多身沒一身生離出入相皆由深定力故得有如是出其本因異境入定同境起如於前五境入正定於法塵中定得起同境入定異境起於法塵中入正定於前五境從定起一身入定多身起如比丘身中入正定學無學身中從定出多身入定一身起諸天身中入正定大龍身中從定出六主伴㸦現帝網觀梵語因陀羅此云主謂此天主有妙勝殿殿上有網周遍圍繞護淨莊嚴以摩尼寶珠為之珠光交徹喻此觀境重重無盡以自為主彌勒望他為伴善財一法為主一樓閣一切法為伴百千樓一身為主善財一身一切身為伴彌勒百千隨舉一法如舉一身一智也言主伴齊收即收多身衆緣也亦是悲智重重無盡者此收第四智身影現衆緣觀也前文謂一身為主一切身為伴即收第五多身入一鏡像觀向所謂第四一智望現多第五多身入二第六一多同時身智無盡不其然乎善財童子從祇桓林中初見文殊在沙羅林中今通指本會也祗桓玄應法師翻云勝林新云逝多漸次南行尅定見五十四人善知識大樓閣前即德生童子有德童女指示彌勒住處暫時斂念標定也開樓閣門令我得入初見彌勒從別處來向樓閣所故令我得入彌勒彈指其門即開令其諸法亡言會旨則佛法門開善財入已還閉如故即妄而真更無入處故云還閉各現百千樓閣經云或見其中有無量百千諸妙樓閣各有善財童子經云自見其身遍一切樓閣中在彌勒前經云或見彌勒初發菩提心時或見最初證得慈心三昧六重若準圭峯釋之此六但是一道竪窮展轉玄妙非一體外別有餘五既不傍橫故云六重不云六段善財一生皆全證者即大疏序云解行在躬一生圓曠劫之果也一際絶其始終釋上句始舒終卷皆歸一心也出入亡其表裏釋次句出顯入隱豈存內外乎初心正覺即梵行品云初發心時便成正覺具如前釋攝多生於剎那即前文念包九世延促同時亦是念劫圓融也十信道圓者謂於信位證道圓極也賢首品偈云信能增益最勝智信能示現一切佛一念該於佛地者一念即信心也經云一切諸佛從信心起大疏釋此品宗趣云於信門中成普賢德而自在莊嚴無方大用建立衆生通括始終該攝諸位以為其宗令起圓融信行成位德用而為意趣然十信道圓一念該於佛地是觀門還源之要故引宗趣以示之地前菩薩觸事生疑者即寶性論空亂意菩薩疑三種空已如前辨五百聲聞玄鑒絶分者絶見聞之分也此反用肇公般若論意彼云虗心玄鑒閉智塞聽閉智眼不見也塞聽耳不聞也即本會舍利弗目犍連等在逝多林不見不聞如來神力如來淨剎云云故大疏序云上德聲聞杜視聽於嘉會通玄論云目連鶖子隔視聽於對顏且疏與論皆以杜隔視聽釋經眼不見耳不聞鶖子皆影響衆權示聾盲他宗謂小乘在座如聾若啞甚背雜華蓮經格訓矣夫聾啞即耳不聞口無說也至如華嚴末會鶖子讚文殊勝德令海覺諸比丘承事之豈是聲聞無說耶又如法華經中敘其窮子稱慈大呌豈是小乘若啞耶嗟乎差之毫𨤲謬以千里前車既翻後宜改轍融通下示圓證當機若據一體謂自性清淨體即是海印炳現三昧者亦是自性用也正同第一海卯森羅常住用矣二約二用即名華嚴妙行三昧正同第二法界圓明自在用矣若據三遍即是塵含十方三昧者十方謂真空妙有正同一塵含容空有遍以第三遍合於前二若準四德即名四攝攝生三昧者釋此有三先標四德明攝次以觀文為據後引賢首品偈證之一隨緣妙用無方德即同事攝以觀文有應病與藥令得服行故偈云一切世間衆生苦患深廣無涯如大海與波同事悉同忍令其利益得安樂二威儀住持有則德即愛語攝以觀文有大乘八萬小乘三千故偈云八萬四千諸法門諸佛以此度衆生種種梵音皆具足隨其心樂為說法三柔和質直攝生德即利行攝以觀文有柔則伏滅煩惱和則順理修行故偈云若有衆生壽無量煩惱微細樂具足菩薩於中得自在示受者老病死衆患四普代衆生受苦德即布施攝以觀文有普令斷惡備修萬行故偈云薩其所欲皆令滿普為衆生作饒益隨應普現愜其心俾樂色者皆從道若約五止即為寂用無礙三昧者以賢首品中有三十四偈半明寂用無涯三昧門彼有一偈標名總辨所謂有勝三昧名方網菩薩住此廣開示一切方中普現身或現入定或從出疏釋云約處名為方網約相是謂寂用亦總顯動寂無二也若取六觀即是佛果無礙三昧者此有二釋一依經文二約觀義依經者因陀羅網三昧中有半偈謂此大名稱諸聖人三昧解脫神通力即佛果無礙也約觀者上文謂融通無礙一多交參圓證相應名為佛地如是下二句謂此六三昧隨德立名六止前六重門據教說為六觀向明六止對六觀謂此也無生下二句理事無礙次二句事事無礙圖度也識盡見除者情識盡而妄見除則反本還源亦同圭峯云情盡見除冥於法界矣余我敏達素本玩習也偶木之文彌天之義者偶遇也圓覺鈔以海中浮木孔喻佛難處衆生喻盲龜盲龜遇木漂至海岸如衆生遇佛得出苦海今以偶木之文即華嚴經彌天之義即還源觀亦猶盲龜遇木孔蓋謙辭耳法華涅槃皆有此喻三偈辨勉學備尋諸教本者前序亦謂備三藏之玄文憑五乘之妙旨集茲華嚴觀者序文云窮茲性海會彼行林別舉六門通為一觀文約義無缺序謂繁辭必削缺義復全智者當勤學即序末云佩道君子俯而詳焉引前序文釋後偈辭原始要終義歸一揆是知吾祖筆削之功起盡之勢增益詳明薀乎其中矣於時元德三年六月二十三日於東大寺東室書寫了華嚴末資大法師寬杲生年四十一
